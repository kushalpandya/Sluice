name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "vite.config.ts"
      - "package.json"
      - ".github/workflows/demo.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # web/src/config.js is gitignored (per-instance, adopter-owned) — CI
      # starts from the committed template.
      - run: cp web/src/config.example.js web/src/config.js
      - run: npm run build:demo
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
